<!DOCTYPE html>
<html lang="es">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
      :root {
        --accent-cyan: #00E5FF;
        --glass-bg: rgba(15, 23, 42, 0.75);
      }
      
      body {
        margin: 0; padding: 0;
        background-color: #000;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex; flex-direction: column;
        overflow: hidden; color: white;
      }

      #video-stream {
        position: absolute;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: 1;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .mirror-view { transform: scaleX(-1); }

      #frame-overlay {
        position: absolute;
        width: 100%; height: 100%;
        object-fit: fill;
        pointer-events: none;
        z-index: 2;
      }

      .hud-controls {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.85));
        padding: 40px 20px;
        display: flex; flex-direction: column;
        align-items: center; gap: 20px;
        z-index: 10;
      }

      .btn-container {
        display: flex; align-items: center;
        justify-content: center; gap: 40px;
        width: 100%;
      }

      .shutter-outer {
        width: 84px; height: 84px;
        border-radius: 50%;
        border: 4px solid white;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s ease;
      }

      .btn-shutter {
        width: 66px; height: 66px;
        border-radius: 50%;
        background-color: white;
        border: none;
        box-shadow: 0 0 20px rgba(255,255,255,0.3);
      }
      
      .shutter-outer:active { transform: scale(0.9); border-color: var(--accent-cyan); }
      .shutter-outer:active .btn-shutter { background-color: var(--accent-cyan); }

      .btn-round-action {
        width: 54px; height: 54px;
        border-radius: 50%;
        background: var(--glass-bg);
        border: 1px solid rgba(255,255,255,0.3);
        display: flex; align-items: center; justify-content: center;
        color: white; transition: all 0.3s;
      }

      .btn-round-action:active { background: var(--accent-cyan); color: #000; transform: rotate(180deg); }

      #flash-effect {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: white; opacity: 0; pointer-events: none; z-index: 999;
      }

      #canvas-processor { display: none; }
    </style>
  </head>
  <body>

    <div id="flash-effect"></div>

    <video id="video-stream" autoplay playsinline muted></video>
    
    <img id="frame-overlay" src="marco.png" alt="Marco"> 

    <div class="hud-controls">
      <div class="btn-container">
        <div style="width: 54px;"></div> 
        
        <div class="shutter-outer" onclick="capturarYDescargar()">
          <button class="btn-shutter"></button>
        </div>
        
        <button class="btn-round-action" onclick="alternarCamara()">
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2v1z"/>
            <path d="M8 4.5a.5.5 0 0 0 .5-.5V1a.5.5 0 0 0-1 0v3a.5.5 0 0 0 .5.5z"/>
          </svg>
        </button>
      </div>
      <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7;">Cámara HUD v3.1 // Gente Zoom</span>
    </div>

    <canvas id="canvas-processor"></canvas>

    <script>
      const video = document.getElementById('video-stream');
      const canvas = document.getElementById('canvas-processor');
      const marco = document.getElementById('frame-overlay');
      const flash = document.getElementById('flash-effect');
      
      let streamActual = null;
      let modoCamara = "environment"; 

      function encenderCamara() {
        if (streamActual) { streamActual.getTracks().forEach(track => track.stop()); }
        const constraints = {
          video: { facingMode: modoCamara, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints)
          .then(stream => {
            streamActual = stream;
            video.srcObject = stream;
            video.classList.toggle('mirror-view', modoCamara === "user");
          })
          .catch(err => {
            Swal.fire('Error', 'No se pudo acceder a la cámara.', 'error');
          });
      }

      function alternarCamara() {
        modoCamara = (modoCamara === "environment") ? "user" : "environment";
        encenderCamara();
      }

      function capturarYDescargar() {
        flash.style.transition = "none";
        flash.style.opacity = "1";
        setTimeout(() => { 
          flash.style.transition = "opacity 0.4s ease-out";
          flash.style.opacity = "0"; 
        }, 40);

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();

        if (modoCamara === "user") {
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        // Dibuja el marco sobre el lienzo sólo si ha cargado correctamente
        if (marco.complete && marco.naturalWidth !== 0) {
          ctx.drawImage(marco, 0, 0, canvas.width, canvas.height);
        }

        const dataURL = canvas.toDataURL('image/jpeg', 0.90);

        // --- ENVÍO AL DRIVE ---
        const URL_DE_TU_PUENTE = "https://script.google.com/macros/s/AKfycby_9aRAgmcxGO2lKev1o5Hw9C63wLVINQ9-x5GYoNMdNB6lO-5F95q1xxpNZ2uTmwC3Aw/exec";

        if(URL_DE_TU_PUENTE) {
          fetch(URL_DE_TU_PUENTE, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataURL })
          })
          .then(() => console.log("Copia enviada con éxito a Google Drive."))
          .catch(err => console.error("Error en envío secundario:", err));
        }

        // --- DESCARGA EN EL DISPOSITIVO ---
        try {
          canvas.toBlob((blob) => {
            const urlDescarga = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `Captura_GenteZoom_${Date.now()}.jpg`;
            a.href = urlDescarga;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(urlDescarga);
            
            Swal.fire({ title: '¡Guardada!', icon: 'success', timer: 800, showConfirmButton: false });
          }, 'image/jpeg', 0.95);
        } catch (e) {
          Swal.fire('Error', 'Error al procesar la descarga.', 'error');
        }
      }
      
      window.addEventListener('DOMContentLoaded', encenderCamara);
    </script>
  </body>
</html>
